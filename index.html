<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator - Academic Performance Tracking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Figtree:wght@500;600;700;800&display=swap');

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --dark-bg: #0f172a;
            --dark-secondary: #1e293b;
            --dark-tertiary: #334155;
            --dark-border: #475569;
            --dark-input: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --radius: 12px;
            --radius-lg: 20px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--dark-secondary) 50%, var(--dark-bg) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
            animation: drift 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }

        .wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--dark-secondary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--dark-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            max-width: 950px;
            width: 100%;
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-family: 'Figtree', sans-serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 1.05rem;
            opacity: 0.95;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .tabs {
            display: flex;
            background: var(--dark-tertiary);
            border-bottom: 1px solid var(--dark-border);
            flex-wrap: wrap;
            gap: 0;
        }

        .tab-button {
            flex: 1;
            min-width: 140px;
            padding: 16px 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-tertiary);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            letter-spacing: 0.3px;
        }

        .tab-button::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .tab-button:hover {
            color: var(--primary-light);
            background: rgba(99, 102, 241, 0.1);
        }

        .tab-button.active {
            color: var(--primary-light);
            background: rgba(99, 102, 241, 0.08);
        }

        .tab-button.active::after {
            transform: scaleX(1);
        }

        .content {
            padding: 40px;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-box {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 30px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideRight 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideRight {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        input,
        select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--dark-border);
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: var(--dark-input);
            color: var(--text-primary);
        }

        input::placeholder,
        select {
            color: var(--text-tertiary);
        }

        input:hover,
        select:hover {
            border-color: rgba(99, 102, 241, 0.4);
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .course-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 15px;
            margin-bottom: 15px;
            align-items: end;
            padding: 18px;
            background: var(--dark-tertiary);
            border-radius: var(--radius);
            border: 1px solid var(--dark-border);
            transition: all 0.3s ease;
            animation: slideDown 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .course-row:hover {
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.4);
        }

        @media (max-width: 768px) {
            .course-row {
                grid-template-columns: 1fr;
            }
        }

        .semester-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            margin-bottom: 15px;
            align-items: end;
            padding: 18px;
            background: var(--dark-tertiary);
            border-radius: var(--radius);
            border: 1px solid var(--dark-border);
            transition: all 0.3s ease;
            animation: slideDown 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .semester-row:hover {
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.4);
        }

        @media (max-width: 768px) {
            .semester-row {
                grid-template-columns: 1fr;
            }
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            flex: 1;
            min-width: 160px;
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--dark-tertiary);
            color: var(--text-primary);
            flex: 1;
            min-width: 160px;
            border: 1px solid var(--dark-border);
        }

        .btn-secondary:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #ff7675;
            padding: 8px 12px;
            min-width: auto;
            border: 1px solid rgba(239, 68, 68, 0.2);
            font-size: 0.85rem;
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        .btn-add {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: white;
            padding: 10px 18px;
            font-size: 0.9rem;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.4);
        }

        .result {
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 28px;
            border-radius: var(--radius);
            margin-top: 30px;
            animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .result-item {
            margin-bottom: 18px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .result-label {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .result-value {
            color: var(--primary-light);
            font-size: 1.6rem;
            font-weight: 700;
            font-family: 'Figtree', sans-serif;
        }

        .error,
        .success {
            padding: 16px 20px;
            border-radius: var(--radius);
            margin-top: 20px;
            display: none;
            animation: slideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .error.show,
        .success.show {
            display: flex;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            color: #ff7675;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .success {
            background: rgba(16, 185, 129, 0.1);
            color: #52c41a;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        @media (max-width: 768px) {
            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .content {
                padding: 25px 20px;
            }

            .tab-button {
                min-width: 100px;
                padding: 14px 12px;
                font-size: 0.85rem;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
                min-width: auto;
                flex: unset;
            }

            .result-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <div class="header-content">
                    <h1>CGPA Calculator</h1>
                    <p>Precise Academic Planning & Performance Tracking</p>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-button active" onclick="switchTab(0)">Semester GPA</button>
                <button class="tab-button" onclick="switchTab(1)">CGPA Calculator</button>
                <button class="tab-button" onclick="switchTab(2)">CGPA Predictor</button>
            </div>

            <!-- Tab 1: Semester GPA Calculator -->
            <div class="content active" id="tab0">
                <div class="info-box">
                    <span>Info:</span>
                    <span>Add courses with their grades and credits. Grades: S=10, A=9, B=8, C=7, D=6, E=5</span>
                </div>
                <div id="coursesContainer"></div>
                <button class="btn-add" onclick="addCourseRow()">Add Course</button>
                <div class="button-group">
                    <button class="btn-primary" onclick="calculateSemesterGPA()">Calculate GPA</button>
                    <button class="btn-secondary" onclick="clearSemesterTab()">Clear</button>
                </div>
                <div class="error" id="semesterError"></div>
                <div id="semesterResult"></div>
            </div>

            <!-- Tab 2: CGPA Calculator -->
            <div class="content" id="tab1">
                <div class="info-box">
                    <span>Info:</span>
                    <span>Enter GPA and credits for each completed semester</span>
                </div>
                <div id="semestersContainer"></div>
                <button class="btn-add" onclick="addSemesterRow()">Add Semester</button>
                <div class="button-group">
                    <button class="btn-primary" onclick="calculateCGPA()">Calculate CGPA</button>
                    <button class="btn-secondary" onclick="clearCGPATab()">Clear</button>
                </div>
                <div class="error" id="cgpaError"></div>
                <div id="cgpaResult"></div>
            </div>

            <!-- Tab 3: CGPA Predictor -->
            <div class="content" id="tab2">
                <div class="info-box">
                    <span>Info:</span>
                    <span>Predict your final CGPA based on current and expected performance</span>
                </div>
                <div class="form-group">
                    <label>Current CGPA</label>
                    <input type="number" id="currentCGPA" min="0" max="10" step="0.01" placeholder="e.g., 8.50">
                </div>
                <div class="form-group">
                    <label>Total Credits Completed</label>
                    <input type="number" id="totalCreditsCompleted" min="0" step="0.5" placeholder="e.g., 48">
                </div>
                <div class="form-group">
                    <label>Current Semester GPA</label>
                    <input type="number" id="currentSemesterGPA" min="0" max="10" step="0.01" placeholder="e.g., 9.00">
                </div>
                <div class="form-group">
                    <label>Current Semester Credits</label>
                    <input type="number" id="currentSemesterCredits" min="0" step="0.5" placeholder="e.g., 16">
                </div>
                <div class="button-group">
                    <button class="btn-primary" onclick="predictCGPA()">Predict CGPA</button>
                    <button class="btn-secondary" onclick="clearPredictorTab()">Clear</button>
                </div>
                <div class="error" id="predictorError"></div>
                <div id="predictorResult"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            addCourseRow();
            addSemesterRow();
        });

        function switchTab(tabIndex) {
            const contents = document.querySelectorAll('.content');
            contents.forEach(content => content.classList.remove('active'));
            
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(button => button.classList.remove('active'));
            
            document.getElementById(`tab${tabIndex}`).classList.add('active');
            buttons[tabIndex].classList.add('active');
        }

        // ============ SEMESTER GPA CALCULATOR ============
        function addCourseRow() {
            const container = document.getElementById('coursesContainer');
            const rowCount = container.querySelectorAll('.course-row').length + 1;
            
            const row = document.createElement('div');
            row.className = 'course-row';
            row.innerHTML = `
                <div class="form-group">
                    <input type="text" placeholder="Course Name" class="course-name">
                </div>
                <div class="form-group">
                    <select class="course-grade">
                        <option value="">Select Grade</option>
                        <option value="10">S (10)</option>
                        <option value="9">A (9)</option>
                        <option value="8">B (8)</option>
                        <option value="7">C (7)</option>
                        <option value="6">D (6)</option>
                        <option value="5">E (5)</option>
                    </select>
                </div>
                <div class="form-group">
                    <input type="number" placeholder="Credits" class="course-credits" min="0" step="0.5">
                </div>
                <button class="btn-danger" onclick="removeCourseRow(this)">Remove</button>
            `;
            container.appendChild(row);
        }

        function removeCourseRow(button) {
            button.closest('.course-row').remove();
        }

        function calculateSemesterGPA() {
            const errorDiv = document.getElementById('semesterError');
            errorDiv.classList.remove('show');
            errorDiv.textContent = '';

            const rows = document.querySelectorAll('#coursesContainer .course-row');
            let totalGradePoints = 0;
            let totalCredits = 0;
            let validRows = 0;

            rows.forEach(row => {
                const grade = row.querySelector('.course-grade').value;
                const credits = parseFloat(row.querySelector('.course-credits').value);

                if (grade && credits > 0) {
                    totalGradePoints += parseFloat(grade) * credits;
                    totalCredits += credits;
                    validRows++;
                }
            });

            if (validRows === 0) {
                errorDiv.innerHTML = 'Please add at least one course with grade and credits';
                errorDiv.classList.add('show');
                return;
            }

            const gpa = (totalGradePoints / totalCredits).toFixed(2);

            const resultDiv = document.getElementById('semesterResult');
            resultDiv.innerHTML = `
                <div class="result">
                    <div class="result-item">
                        <span class="result-label">Number of Courses</span>
                        <span class="result-value">${validRows}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Total Grade Points</span>
                        <span class="result-value">${totalGradePoints.toFixed(2)}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Total Credits</span>
                        <span class="result-value">${totalCredits.toFixed(2)}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Semester GPA</span>
                        <span class="result-value">${gpa}</span>
                    </div>
                </div>
            `;
        }

        function clearSemesterTab() {
            document.getElementById('coursesContainer').innerHTML = '';
            document.getElementById('semesterResult').innerHTML = '';
            document.getElementById('semesterError').classList.remove('show');
            addCourseRow();
        }

        // ============ CGPA CALCULATOR ============
        function addSemesterRow() {
            const container = document.getElementById('semestersContainer');
            const rowCount = container.querySelectorAll('.semester-row').length + 1;
            
            const row = document.createElement('div');
            row.className = 'semester-row';
            row.innerHTML = `
                <div class="form-group">
                    <label>Semester ${rowCount}</label>
                    <input type="number" placeholder="e.g., 8.50" class="semester-gpa" min="0" max="10" step="0.01">
                </div>
                <div class="form-group">
                    <label>Credits</label>
                    <input type="number" placeholder="e.g., 16" class="semester-credits" min="0" step="0.5">
                </div>
                <button class="btn-danger" onclick="removeSemesterRow(this)">Remove</button>
            `;
            container.appendChild(row);
        }

        function removeSemesterRow(button) {
            button.closest('.semester-row').remove();
        }

        function calculateCGPA() {
            const errorDiv = document.getElementById('cgpaError');
            errorDiv.classList.remove('show');
            errorDiv.textContent = '';

            const rows = document.querySelectorAll('#semestersContainer .semester-row');
            let totalWeightedGPA = 0;
            let totalCredits = 0;
            let validRows = 0;

            rows.forEach(row => {
                const gpa = parseFloat(row.querySelector('.semester-gpa').value);
                const credits = parseFloat(row.querySelector('.semester-credits').value);

                if (gpa >= 0 && credits > 0) {
                    totalWeightedGPA += gpa * credits;
                    totalCredits += credits;
                    validRows++;
                }
            });

            if (validRows === 0) {
                errorDiv.innerHTML = 'Please add at least one semester with GPA and credits';
                errorDiv.classList.add('show');
                return;
            }

            const cgpa = (totalWeightedGPA / totalCredits).toFixed(2);

            const resultDiv = document.getElementById('cgpaResult');
            resultDiv.innerHTML = `
                <div class="result">
                    <div class="result-item">
                        <span class="result-label">Semesters Completed</span>
                        <span class="result-value">${validRows}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Total Weighted GPA</span>
                        <span class="result-value">${totalWeightedGPA.toFixed(2)}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Total Credits</span>
                        <span class="result-value">${totalCredits.toFixed(2)}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Cumulative GPA (CGPA)</span>
                        <span class="result-value">${cgpa}</span>
                    </div>
                </div>
            `;
        }

        function clearCGPATab() {
            document.getElementById('semestersContainer').innerHTML = '';
            document.getElementById('cgpaResult').innerHTML = '';
            document.getElementById('cgpaError').classList.remove('show');
            addSemesterRow();
        }

        // ============ CGPA PREDICTOR ============
        function predictCGPA() {
            const errorDiv = document.getElementById('predictorError');
            errorDiv.classList.remove('show');

            const currentCGPA = parseFloat(document.getElementById('currentCGPA').value);
            const totalCreditsCompleted = parseFloat(document.getElementById('totalCreditsCompleted').value);
            const currentSemesterGPA = parseFloat(document.getElementById('currentSemesterGPA').value);
            const currentSemesterCredits = parseFloat(document.getElementById('currentSemesterCredits').value);

            if (isNaN(currentCGPA) || isNaN(totalCreditsCompleted) || isNaN(currentSemesterGPA) || isNaN(currentSemesterCredits)) {
                errorDiv.innerHTML = 'Please fill in all fields with valid numbers';
                errorDiv.classList.add('show');
                return;
            }

            if (currentCGPA < 0 || currentCGPA > 10 || currentSemesterGPA < 0 || currentSemesterGPA > 10) {
                errorDiv.innerHTML = 'GPA values must be between 0 and 10';
                errorDiv.classList.add('show');
                return;
            }

            if (totalCreditsCompleted < 0 || currentSemesterCredits < 0) {
                errorDiv.innerHTML = 'Credits must be non-negative';
                errorDiv.classList.add('show');
                return;
            }

            const totalWeightedGPA = currentCGPA * totalCreditsCompleted + currentSemesterGPA * currentSemesterCredits;
            const totalCredits = totalCreditsCompleted + currentSemesterCredits;
            const predictedCGPA = (totalWeightedGPA / totalCredits).toFixed(2);

            const resultDiv = document.getElementById('predictorResult');
            resultDiv.innerHTML = `
                <div class="result">
                    <div class="result-item">
                        <span class="result-label">Current CGPA</span>
                        <span class="result-value">${currentCGPA.toFixed(2)}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Current Semester GPA</span>
                        <span class="result-value">${currentSemesterGPA.toFixed(2)}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Total Credits After Semester</span>
                        <span class="result-value">${totalCredits.toFixed(2)}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Predicted Final CGPA</span>
                        <span class="result-value">${predictedCGPA}</span>
                    </div>
                </div>
            `;
        }

        function clearPredictorTab() {
            document.getElementById('currentCGPA').value = '';
            document.getElementById('totalCreditsCompleted').value = '';
            document.getElementById('currentSemesterGPA').value = '';
            document.getElementById('currentSemesterCredits').value = '';
            document.getElementById('predictorResult').innerHTML = '';
            document.getElementById('predictorError').classList.remove('show');
        }
    </script>
</body>
</html>
